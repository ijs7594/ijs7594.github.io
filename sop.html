<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>一日作業流程 · 漢柏分身</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --brown-dark:  #2C1A0E;
      --brown-main:  #8B5E3C;
      --caramel:     #C17B4E;
      --sand:        #D4A574;
      --warm-white:  #FAF7F2;
      --card-bg:     #FFFFFF;
      --text-dark:   #2C1A0E;
      --text-mid:    #6B4C35;
      --text-light:  #9E7B60;
      --border:      #EDE0D0;
    }
    body {
      font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
      background: var(--warm-white);
      color: var(--text-dark);
      display: flex; height: 100vh; overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 200px; min-width: 200px;
      background: var(--brown-dark);
      display: flex; flex-direction: column; padding: 20px 0;
    }
    .sidebar-brand {
      display: flex; align-items: center; gap: 10px;
      padding: 0 16px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .avatar-sq {
      width: 36px; height: 36px; border-radius: 8px;
      background: linear-gradient(135deg, var(--caramel), var(--brown-main));
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .brand-name { font-size: 14px; font-weight: 600; color: #fff; }
    .brand-sub  { font-size: 10px; color: rgba(255,255,255,0.4); margin-top: 1px; }
    .nav-list { display: flex; flex-direction: column; gap: 2px; padding: 16px 8px; }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 10px; border-radius: 8px; text-decoration: none;
      color: rgba(255,255,255,0.5); font-size: 13px; transition: background 0.15s;
    }
    .nav-item:hover { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.85); }
    .nav-item.active { background: rgba(255,255,255,0.13); color: #fff; }
    .nav-icon { font-size: 16px; width: 20px; text-align: center; }
    .nav-text { font-weight: 500; font-size: 13px; }
    .nav-sub-text { font-size: 10px; color: rgba(255,255,255,0.3); }

    /* ── Main ── */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    /* ── Topbar ── */
    .topbar {
      background: var(--card-bg); border-bottom: 1px solid var(--border);
      padding: 14px 24px; display: flex; align-items: center; gap: 12px;
      flex-shrink: 0;
    }
    .topbar-icon { font-size: 22px; }
    .topbar-title { font-size: 17px; font-weight: 700; }
    .topbar-sub { font-size: 12px; color: var(--text-light); margin-top: 1px; }
    .version-badge {
      margin-left: auto; font-size: 11px; font-weight: 600;
      padding: 4px 12px; border-radius: 20px;
      background: var(--warm-white); border: 1.5px solid var(--border);
      color: var(--text-light);
    }

    /* ── Content ── */
    .content { flex: 1; overflow-y: auto; padding: 20px 24px 48px; }

    /* ── Section card ── */
    .section-card {
      background: var(--card-bg); border: 1.5px solid var(--border);
      border-radius: 14px; margin-bottom: 12px; overflow: hidden;
    }
    .section-header {
      display: flex; align-items: center; gap: 12px;
      padding: 16px 18px; cursor: pointer; user-select: none;
      transition: background 0.15s;
    }
    .section-header:hover { background: var(--warm-white); }
    .section-dot {
      width: 40px; height: 40px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .section-info { flex: 1; }
    .section-name { font-size: 14px; font-weight: 700; }
    .section-time { font-size: 11px; color: var(--text-light); margin-top: 2px; }
    .step-count {
      font-size: 11px; font-weight: 600; padding: 3px 10px;
      border-radius: 12px; background: var(--warm-white);
      color: var(--text-mid); border: 1px solid var(--border);
    }
    .chevron {
      font-size: 11px; color: var(--text-light); transition: transform 0.2s;
      margin-left: 6px;
    }
    .section-card.open .chevron { transform: rotate(180deg); }

    .section-body {
      display: none; border-top: 1px solid var(--border);
      padding: 4px 18px 14px;
    }
    .section-card.open .section-body { display: block; }

    /* ── Steps ── */
    .step-row {
      display: flex; gap: 12px;
      padding: 11px 4px; border-bottom: 1px solid var(--border);
    }
    .step-row:last-child { border-bottom: none; }
    .step-num {
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--warm-white); border: 1.5px solid var(--border);
      color: var(--text-light); font-size: 11px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: 2px;
    }
    .step-text { font-size: 14px; line-height: 1.65; }
    .step-note {
      font-size: 12px; color: var(--text-light); margin-top: 3px;
    }
    .step-empty {
      padding: 18px 4px; font-size: 13px; color: var(--text-light);
      font-style: italic; text-align: center;
    }

    @media (max-width: 680px) { .sidebar { display: none; } }
  </style>
</head>
<body>

<nav class="sidebar">
  <div class="sidebar-brand">
    <div class="avatar-sq">🌱</div>
    <div>
      <div class="brand-name">漢柏分身</div>
      <div class="brand-sub">貴焿管理中樞</div>
    </div>
  </div>
  <div class="nav-list">
    <a class="nav-item" href="index.html">
      <span class="nav-icon">🏠</span>
      <div><div class="nav-text">總覽</div><div class="nav-sub-text">Dashboard</div></div>
    </a>
    <a class="nav-item" href="inbox.html">
      <span class="nav-icon">📋</span>
      <div><div class="nav-text">待辦</div><div class="nav-sub-text">Inbox</div></div>
    </a>
    <a class="nav-item active" href="sop.html">
      <span class="nav-icon">📖</span>
      <div><div class="nav-text">一日流程</div><div class="nav-sub-text">作業手冊</div></div>
    </a>
    <a class="nav-item" href="scripts.html">
      <span class="nav-icon">✍️</span>
      <div><div class="nav-text">Scripts</div><div class="nav-sub-text">腳本庫</div></div>
    </a>
    <a class="nav-item" href="liuqiu2026.html">
      <span class="nav-icon">🐢</span>
      <div><div class="nav-text">小琉球</div><div class="nav-sub-text">員工旅遊</div></div>
    </a>
  </div>
</nav>

<div class="main">
  <div class="topbar">
    <span class="topbar-icon">📖</span>
    <div>
      <div class="topbar-title">一日作業流程</div>
      <div class="topbar-sub">貴焿古早味麵線羹 · 作業手冊</div>
    </div>
    <div class="version-badge" id="ver-badge">載入中…</div>
  </div>

  <div class="content" id="section-list">
    <!-- Rendered by JS -->
  </div>
</div>

<script>
  const SECTIONS = [
    {
      id: 'pre-open',
      label: '開店前',
      icon: '🌅',
      bg: '#FFF8ED',
      time: '開店前 30 分鐘',
      steps: [
        { text: '開燈、開冷氣、開設備電源' },
        { text: '確認今日食材備料狀況' },
        { text: '補充醬料、調味料至定位' },
        { text: '清潔並整理工作台面' },
        { text: '備齊出餐用具與消耗品' },
      ]
    },
    {
      id: 'open-check',
      label: '開店當下檢視',
      icon: '✅',
      bg: '#F0FFF6',
      time: '準時開門時',
      steps: [
        { text: '翻牌開店、門口整理' },
        { text: '確認收銀台零錢已備妥' },
        { text: '開啟點餐系統 / POS' },
        { text: '確認出餐動線暢通無阻' },
        { text: '通知全員就位' },
      ]
    },
    {
      id: 'off-peak-1',
      label: '離峰工作（早）',
      icon: '☕',
      bg: '#FFFBF0',
      time: '早離峰時段',
      steps: [
        { text: '補充備料、進行前置作業' },
        { text: '清潔前台與候位區域' },
        { text: '確認庫存並回報缺貨' },
        { text: '環境巡視，整頓陳列' },
      ]
    },
    {
      id: 'peak-1',
      label: '巔峰工作（午）',
      icon: '⚡',
      bg: '#FFF5F0',
      time: '午間尖峰時段',
      steps: [
        { text: '快速出餐，保持出餐節奏' },
        { text: '即時補充食材與備料' },
        { text: '隨時維持場域整潔' },
        { text: '協助顧客引導與等候管理' },
      ]
    },
    {
      id: 'defrost',
      label: '退冰整頓工作',
      icon: '❄️',
      bg: '#F0F6FF',
      time: '午後整備時段',
      steps: [
        { text: '退冰隔日所需食材' },
        { text: '整頓與補充冷藏庫存' },
        { text: '補充衛材、包材等消耗品' },
        { text: '回報明日預估備料量' },
      ]
    },
    {
      id: 'off-peak-2',
      label: '離峰工作（午後）',
      icon: '🌤️',
      bg: '#FFFBF0',
      time: '午後離峰時段',
      steps: [
        { text: '深度清潔廚具設備' },
        { text: '補充下午場備料' },
        { text: '小組工作交接確認' },
      ]
    },
    {
      id: 'peak-2',
      label: '巔峰工作（晚）',
      icon: '🔥',
      bg: '#FFF0EC',
      time: '晚間尖峰時段',
      steps: [
        { text: '快速出餐，維持服務品質' },
        { text: '即時補充食材與備料' },
        { text: '留意剩餘備料，適時收量' },
        { text: '協助顧客引導與等候管理' },
      ]
    },
    {
      id: 'pre-close',
      label: '收店前工作',
      icon: '🌙',
      bg: '#F5F0FF',
      time: '停止接單後',
      steps: [
        { text: '停止接單，消化剩餘訂單' },
        { text: '清除剩餘食材，妥善保存' },
        { text: '清潔廚具、設備歸位' },
        { text: '環境全面整理' },
      ]
    },
    {
      id: 'closing',
      label: '收銀打烊工作',
      icon: '🔒',
      bg: '#F0FFF4',
      time: '打烊流程',
      steps: [
        { text: '結算今日收銀金額' },
        { text: '填寫收銀日報單' },
        { text: '關閉設備電源、冷氣' },
        { text: '鎖門並回報主管確認' },
      ]
    },
  ];

  let openSections = {};
  SECTIONS.forEach(s => { openSections[s.id] = true; });

  function toggle(id) {
    openSections[id] = !openSections[id];
    render();
  }

  function render() {
    const list = document.getElementById('section-list');
    list.innerHTML = SECTIONS.map((s, idx) => {
      const isOpen = openSections[s.id];
      const stepsHtml = s.steps.length
        ? s.steps.map((st, i) => `
            <div class="step-row">
              <div class="step-num">${i + 1}</div>
              <div>
                <div class="step-text">${st.text}</div>
                ${st.note ? `<div class="step-note">${st.note}</div>` : ''}
              </div>
            </div>`).join('')
        : '<div class="step-empty">尚未建立步驟內容</div>';

      return `
        <div class="section-card${isOpen ? ' open' : ''}">
          <div class="section-header" onclick="toggle('${s.id}')">
            <div class="section-dot" style="background:${s.bg}">${s.icon}</div>
            <div class="section-info">
              <div class="section-name">${s.label}</div>
              <div class="section-time">${s.time}</div>
            </div>
            <div class="step-count">${s.steps.length} 步</div>
            <div class="chevron">▼</div>
          </div>
          <div class="section-body">${stepsHtml}</div>
        </div>`;
    }).join('');
  }

  const now = new Date();
  document.getElementById('ver-badge').textContent =
    `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()} 版`;

  render();
</script>
</body>
</html>
